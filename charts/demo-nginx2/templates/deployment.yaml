apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "demo-nginx2.fullname" . }}
  labels:
    {{- include "demo-nginx2.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "demo-nginx2.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "demo-nginx2.labels" . | nindent 8 }}
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
